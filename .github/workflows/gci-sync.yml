name: GCI Weekly Upstream Sync

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  sync:
    name: Sync from Upstream
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure Git
        run: |
          git config user.name "GCI Bot"
          git config user.email "gci-bot@gci-financial.com"
      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/windmill-labs/windmill.git || true
      - name: Fetch Upstream
        run: git fetch upstream
      - name: Merge Upstream Changes
        run: |
          git merge upstream/main --allow-unrelated-histories -m "Sync upstream changes $(date +%Y-%m-%d)" || echo "Merge conflicts - requires manual resolution"
      - name: Push Changes
        run: git push origin main
